<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plano ENEM · 2h por dia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="plano-enem.css">
</head>
<body>

<header class="topbar">
  <div class="topbar-logo">
    <div class="logo-dot"></div>
    Plano ENEM
  </div>
  <div class="topbar-week">
    <button onclick="changeWeek(-1)">&#8592;</button>
    <span id="week-label">Semana 1</span>
    <button onclick="changeWeek(1)">&#8594;</button>
  </div>
</header>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-section progress-global">
      <div class="sidebar-title">Esta semana</div>
      <div class="prog-bar-wrap"><div class="prog-bar-fill" id="prog-fill"></div></div>
      <div class="prog-stats">
        <div class="prog-stat"><div class="val" id="stat-done">0</div><div class="lbl">sessões feitas</div></div>
        <div class="prog-stat"><div class="val" id="stat-pct">0%</div><div class="lbl">concluído</div></div>
        <div class="prog-stat"><div class="val" id="stat-hours">0h</div><div class="lbl">estudadas</div></div>
        <div class="prog-stat"><div class="val" id="stat-streak">0</div><div class="lbl">dias seguidos</div></div>
      </div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">Dias da semana</div>
      <div id="day-list"></div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main" id="main-content"></main>

  <!-- AI PANEL -->
  <aside class="ai-panel">
    <div>
      <div class="ai-panel-title"><span class="ai-spark">✦</span> Assistente de estudos</div>
      <p style="font-size:12px;color:var(--ink-3)">Pergunte sobre qualquer assunto do plano</p>
    </div>
    <div class="ai-chat-area" id="chat-area"></div>
    <div class="suggestion-chips" id="chips"></div>
    <div class="ai-input-row">
      <textarea class="ai-input" id="ai-input" placeholder="Perguntar sobre o assunto de hoje…" onkeydown="handleKey(event)"></textarea>
      <button class="ai-send" id="ai-send" onclick="sendMsg()">Enviar</button>
    </div>
  </aside>

</div>

<script src="plano-enem.js"></script>
</body>
</html>
